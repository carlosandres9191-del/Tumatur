
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Tuma Tour</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="crm-login-wrap" id="loginWrap">
    <div class="crm-login-card">
      <h1>CRM Tuma Tour</h1>
      <p>Acceso administrativo</p>
      <form id="loginForm" class="booking-form">
        <input type="text" id="crmUser" placeholder="Usuario" required>
        <input type="password" id="crmPass" placeholder="Clave" required>
        <button class="btn btn-gold" type="submit">Ingresar</button>
      </form>
      <small>Usuario: admin | Clave: admin123</small>
    </div>
  </main>

  <div id="crmApp" class="hidden">
    <header class="site-header">
      <div class="container nav">
        <a href="index.html" class="brand">
          <img src="logo.jpeg" alt="Logo Tuma Tour" class="brand-logo">
          <span>CRM Tuma Tour</span>
        </a>
        <button id="logoutBtn" class="btn btn-outline">Salir</button>
      </div>
    </header>

    <main class="section">
      <div class="container crm-grid">
        <section class="panel">
          <span class="tag">Reservas</span>
          <div id="bookingsList" class="admin-list"></div>
        </section>
        <section class="panel">
          <span class="tag">Comentarios</span>
          <div id="crmTestimonialsList" class="admin-list"></div>
        </section>
      </div>
    </main>
  </div>

  <script src="crm.js"></script>
</body>
</html>
